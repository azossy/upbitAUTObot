name: upbit_trading_app
description: 배짱이 v1.1 — 업비트 연동 자동매매 앱
publish_to: 'none'
version: 1.4.0+4
# 저작자: 차리 (challychoi@me.com)

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^14.0.0
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  fl_chart: ^0.69.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  google_sign_in: ^6.2.1
  kakao_flutter_sdk_user: ^1.7.6
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

# 배짱이 앱 아이콘 (MS 앱 아이콘 디자인 가이드라인 반영)
# https://learn.microsoft.com/ko-kr/windows/apps/design/style/iconography/app-icon-design
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon_1024.png"
  adaptive_icon_background: "#FF6B00"
  adaptive_icon_foreground: "assets/icons/app_icon_1024.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon_1024.png"
    background_color: "#FF6B00"
    theme_color: "#FF6B00"
