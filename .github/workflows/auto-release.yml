# 배짱이 — 태그 푸시 시 Release 생성 + APK 빌드 + 업로드 (한 워크플로에서 완결)
# ★ 업로드 APK 파일명: baejjangi-버전.apk (예: baejjangi-1.4.6.apk). app-release.apk 사용 금지.

name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Create Release
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          title="배짱이 $tag"
          body="배짱이(Baejjangi) 업비트 현물 자동매매 앱 — Android APK. 태그 $tag 기준 빌드."
          gh release create "$tag" --title "$title" --notes "$body"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Get dependencies
        working-directory: upbit_trading_app
        run: flutter pub get

      - name: Build APK (release)
        working-directory: upbit_trading_app
        run: flutter build apk --release

      - name: Parse version and rename APK to baejjangi-버전.apk
        id: apk_name
        run: |
          set -e
          PUBSPEC="upbit_trading_app/pubspec.yaml"
          VERSION=$(grep '^version:' "$PUBSPEC" | sed 's/version: *//' | sed 's/+.*//' | tr -d ' ')
          if [ -z "$VERSION" ]; then echo "::error::Could not parse version"; exit 1; fi
          APK_NAME="baejjangi-${VERSION}.apk"
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          SRC="upbit_trading_app/build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$SRC" ]; then echo "::error::Build output not found: $SRC"; exit 1; fi
          cp "$SRC" "./${APK_NAME}"
          echo "Created ${APK_NAME}"

      - name: Upload APK to Release (baejjangi-버전.apk)
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag" "${{ steps.apk_name.outputs.apk_name }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
