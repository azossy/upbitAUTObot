# 배짱이 Android APK 빌드 — 정식 배포용
# Release 생성 시 자동으로 APK 빌드 후 해당 Release에 업로드합니다.
#
# ★ 출력 APK 파일명: baejjangi-버전.apk (예: baejjangi-1-4-5.apk)
#    pubspec.yaml의 version(1.4.5+9 → 1-4-5)으로 생성. 다음 빌드 시에도 동일 적용.

name: Build Release APK

on:
  release:
    types: [published]
  workflow_dispatch:   # Actions 탭에서 "Run workflow" 버튼으로 수동 실행 가능

# Release 업로드 시 403 방지 (반드시 필요)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Get dependencies
        working-directory: upbit_trading_app
        run: flutter pub get

      - name: Build APK (release)
        working-directory: upbit_trading_app
        run: flutter build apk --release

      # 반드시 baejjangi-버전.apk 로 복사·업로드 (Flutter 기본 출력 app-release.apk → 이름 변경)
      - name: Parse version and rename APK to baejjangi-버전.apk
        id: apk_name
        run: |
          set -e
          PUBSPEC="upbit_trading_app/pubspec.yaml"
          if [ ! -f "$PUBSPEC" ]; then echo "::error::Not found: $PUBSPEC"; exit 1; fi
          VERSION=$(grep '^version:' "$PUBSPEC" | sed 's/version: *//' | sed 's/+.*//' | tr -d ' ')
          if [ -z "$VERSION" ]; then echo "::error::Could not parse version from $PUBSPEC"; exit 1; fi
          SLUG=$(echo "$VERSION" | tr '.' '-')
          APK_NAME="baejjangi-${SLUG}.apk"
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          SRC="upbit_trading_app/build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$SRC" ]; then echo "::error::Build output not found: $SRC"; exit 1; fi
          cp "$SRC" "./${APK_NAME}"
          ls -la "./${APK_NAME}"
          echo "Created ${APK_NAME} (from app-release.apk)"

      - name: Upload APK to Release (baejjangi-버전.apk)
        if: github.event.release.tag_name != ''
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ steps.apk_name.outputs.apk_name }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact (수동 실행 시, baejjangi-버전.apk)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_name.outputs.apk_name }}
          path: ${{ steps.apk_name.outputs.apk_name }}
